<!DOCTYPE html>
<html>
<head>
    <title>Fake News Checker</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            padding: 50px;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 60%;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .bar {
            width: 80%;
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            margin: 10px auto;
        }

        .fill {
            height: 100%;
            border-radius: 10px;
        }

        .fake { background: red; }
        .real { background: green; }
    </style>
</head>

<body>

    <div class="container">
        <h2>📰 Fake News Detector AI</h2>

        <form action="/predict" method="post">
            <textarea name="news" placeholder="Paste news here..."></textarea><br>
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
            <div class="result">{{ result }}</div>

            <div class="bar">
                <div class="fill {{ color }}" style="width: {{ confidence }}%;"></div>
            </div>

            <p>Confidence: {{ confidence }}%</p>
        {% endif %}
    </div>

</body>
</html>
