<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body style="text-align:center;font-family:Arial;">

<h1>📊 Dashboard</h1>

<table border="1" style="margin:auto;">
<tr>
<th>News</th>
<th>Category</th>
<th>Confidence</th>
</tr>

{% for item in history %}
<tr>
<td>{{ item.text }}</td>
<td>{{ item.category }}</td>
<td>{{ item.confidence }}%</td>
</tr>
{% endfor %}

</table>

</body>
</html>
